<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>闲鱼代结账</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 360px;
            padding: 20px;
        }
        
        .login-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .login-header p {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .login-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        .login-tabs .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 15px;
            color: var(--text-light);
            border-bottom: 2px solid transparent;
        }
        .login-tabs .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: 500;
        }
        
        .login-form {
            display: none;
        }
        .login-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .error-msg {
            color: #dc2626;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        
        .main-app {
            display: none;
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            min-height: 100vh;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }
        @media (min-width: 440px) {
            .main-app {
                min-height: auto;
                border-radius: 20px;
                margin: 20px auto;
            }
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            color: white;
            padding: 20px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 16px; font-weight: 600; }
        .header .total-value { font-size: 22px; font-weight: 700; }
        .header .total-label { font-size: 11px; opacity: 0.8; margin-top: 2px; }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 16px 20px;
            background: var(--bg);
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
        }
        .stat-card .label { font-size: 10px; color: var(--text-light); }
        .stat-card .value { font-size: 14px; font-weight: 700; margin-top: 2px; }
        .stat-card .value.green { color: var(--success); }
        
        .month-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
        }
        .month-bar button {
            width: 28px; height: 28px;
            border: none; background: var(--bg);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .month-bar span { font-size: 14px; font-weight: 500; }
        
        .action-row {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
        }
        .action-row .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        
        .record-list { padding: 0 20px 20px; }
        .record-card {
            background: var(--bg);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .record-card .top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .record-card .date { font-size: 13px; font-weight: 500; color: var(--text); }
        .record-card .profit { font-size: 16px; font-weight: 700; color: var(--success); }
        .record-card .type-tag {
            font-size: 10px;
            padding: 2px 6px;
            background: #fef3c7;
            color: #d97706;
            border-radius: 4px;
            margin-left: 8px;
        }
        .record-card .details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .record-card .detail-item {
            text-align: center;
            padding: 6px;
            background: var(--card-bg);
            border-radius: 6px;
        }
        .record-card .detail-item .Label { font-size: 9px; color: var(--text-light); }
        .record-card .detail-item .Value { font-size: 11px; font-weight: 500; color: var(--text); }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        
        .bottom-space { height: 20px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
            padding: 16px;
        }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 20px; }
        .modal-content {
            background: var(--card-bg);
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-header h2 { font-size: 16px; font-weight: 600; }
        .modal-close { 
            width: 28px; height: 28px; 
            border: none; background: var(--bg);
            border-radius: 50%; 
            cursor: pointer; 
        }
        
        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            cursor: pointer;
            text-align: center;
        }
        .type-btn.active {
            border-color: var(--primary);
            background: #eff6ff;
        }
        .type-btn .text { font-size: 13px; font-weight: 500; }
        
        .form-section {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
        }
        .form-section h3 {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            color: var(--text);
            background: var(--card-bg);
        }
        
        .calc-results {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .calc-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .calc-item .Label { font-size: 10px; color: var(--text-light); }
        .calc-item .Value { font-size: 13px; font-weight: 600; margin-top: 2px; color: var(--text); }
        .calc-item .Value.green { color: var(--success); }
        
        .save-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            background: var(--success);
            color: white;
        }
        
        .detail-header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            color: white;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .detail-header .label { font-size: 12px; opacity: 0.9; }
        .detail-header .profit { font-size: 28px; font-weight: 700; margin-top: 4px; }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .detail-item {
            background: var(--bg);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .detail-item .Label { font-size: 10px; color: var(--text-light); }
        .detail-item .Value { font-size: 13px; font-weight: 600; color: var(--text); }
        
        .detail-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .detail-actions .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-danger { background: #fef2f2; color: #dc2626; }
        .btn-edit { background: var(--primary); color: white; }
        
        .toast {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }
        .toast.show { display: block; }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-container" id="loginPage">
        <div class="login-card">
            <div class="login-header">
                <h1>💰 闲鱼代结账</h1>
                <p>多用户版本</p>
            </div>
            
            <div class="login-tabs">
                <div class="tab active" onclick="switchTab('login')">登录</div>
                <div class="tab" onclick="switchTab('register')">注册</div>
            </div>
            
            <!-- 登录表单 -->
            <div class="login-form active" id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="login-btn" onclick="doLogin()">登录</button>
                <div class="error-msg" id="loginError"></div>
            </div>
            
            <!-- 注册表单 -->
            <div class="login-form" id="registerForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="regPassword2" placeholder="请再次输入密码">
                </div>
                <button class="login-btn" onclick="doRegister()">注册</button>
                <div class="error-msg" id="regError"></div>
            </div>
        </div>
    </div>
    
    <!-- 主应用 -->
    <div class="main-app" id="mainApp">
        <div class="header">
            <div class="header-top">
                <h1>💰 闲鱼代结账</h1>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:12px">
                <div>
                    <div class="total-value" id="totalProfit">¥0</div>
                    <div class="total-label">累计收入</div>
                </div>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">今日</div>
                <div class="value green" id="todayProfit">¥0</div>
            </div>
            <div class="stat-card">
                <div class="label">本月</div>
                <div class="value green" id="monthProfit">¥0</div>
            </div>
            <div class="stat-card">
                <div class="label">共笔</div>
                <div class="value" id="recordCount">0</div>
            </div>
        </div>
        
        <div class="month-bar">
            <button onclick="changeMonth(-1)">‹</button>
            <span id="currentMonth">2026年3月</span>
            <button onclick="changeMonth(1)">›</button>
        </div>
        
        <div class="action-row">
            <button class="btn btn-outline" onclick="exportExcel()">📥 导出</button>
            <button class="btn btn-primary" onclick="openAddModal()">➕ 记一笔</button>
        </div>
        
        <div class="record-list" id="recordList">
            <div class="empty-state"><p>暂无记录</p></div>
        </div>
        
        <div class="bottom-space"></div>
    </div>
    
    <!-- 添加弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>记一笔收入</h2>
                <button class="modal-close" onclick="closeModal()"></button>
            </div>
            
            <div class="type-selector">
                <div class="type-btn active" id="typeFee" onclick="selectType('fee')">
                    <div class="text">收手续费</div>
                </div>
                <div class="type-btn" id="typeNoFee" onclick="selectType('nofee')">
                    <div class="text">免手续费</div>
                </div>
            </div>
            
            <form id="recordForm" onsubmit="saveRecord(event)">
                <div class="form-section">
                    <h3>基本信息</h3>
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" name="date" id="inputDate" required>
                    </div>
                    <div class="form-group">
                        <label>闲鱼付款金额</label>
                        <input type="number" name="xianyuAmount" id="inputAmount" step="0.01" placeholder="请输入客户付款金额" required oninput="calcResults()">
                    </div>
                </div>
                
                <div class="form-section">
                    <h3>盒马消费</h3>
                    <div class="form-group">
                        <label>盒马实际支付</label>
                        <input type="number" name="hemaActual" id="inputHema" step="0.01" placeholder="请输入盒马实际扣款" oninput="calcResults()">
                    </div>
                </div>
                
                <div class="form-section">
                    <h3>计算结果</h3>
                    <div class="calc-results" id="calcResults"></div>
                </div>
                
                <input type="hidden" name="id" id="recordId">
                <input type="hidden" name="type" id="recordType" value="fee">
                
                <button type="submit" class="save-btn">保存记录</button>
            </form>
        </div>
    </div>
    
    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>记录详情</h2>
                <button class="modal-close" onclick="closeDetail()"></button>
            </div>
            <div id="detailContent"></div>
            <div class="detail-actions">
                <button class="btn btn-danger" onclick="deleteRecord()">删除</button>
                <button class="btn btn-edit" onclick="editRecord()">编辑</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        let currentUser = null;
        let allRecords = [];
        let currentMonth = new Date();
        let currentDetail = null;
        let recordType = 'fee';
        
        // 检查登录状态
        function checkLogin() {
            const saved = localStorage.getItem('xianyu_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                showMainApp();
                init();
            }
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.login-tabs .tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.login-tabs .tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.login-tabs .tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        async function doLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            
            if (!username || !password) {
                errorEl.textContent = '请填写用户名和密码';
                errorEl.classList.add('show');
                return;
            }
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const result = await res.json();
            
            if (result.success) {
                currentUser = result.user;
                localStorage.setItem('xianyu_user', JSON.stringify(currentUser));
                showMainApp();
                init();
            } else {
                errorEl.textContent = result.error;
                errorEl.classList.add('show');
            }
        }
        
        async function doRegister() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const password2 = document.getElementById('regPassword2').value;
            const errorEl = document.getElementById('regError');
            
            if (!username || !password) {
                errorEl.textContent = '请填写用户名和密码';
                errorEl.classList.add('show');
                return;
            }
            
            if (password !== password2) {
                errorEl.textContent = '两次密码不一致';
                errorEl.classList.add('show');
                return;
            }
            
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const result = await res.json();
            
            if (result.success) {
                showToast('注册成功，请登录');
                switchTab('login');
            } else {
                errorEl.textContent = result.error;
                errorEl.classList.add('show');
            }
        }
        
        function logout() {
            localStorage.removeItem('xianyu_user');
            currentUser = null;
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
        
        function showMainApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        }
        
        async function init() {
            await loadData();
            renderRecords();
            updateStats();
            document.getElementById('inputDate').value = new Date().toISOString().substring(0, 10);
            calcResults();
        }
        
        async function loadData() {
            try {
                const res = await fetch('/api/data?userId=' + currentUser.id);
                const result = await res.json();
                if (result.success && result.data && result.data.length > 2) {
                    allRecords = parseExcelData(result.data);
                } else {
                    allRecords = [];
                }
            } catch (err) {
                showToast('加载失败');
                allRecords = [];
            }
        }
        
        function parseExcelData(data) {
            const records = [];
            for (let i = 2; i < data.length; i++) {
                const row = data[i];
                if (!row[0]) continue;
                records.push({
                    id: 'fee_' + i,
                    type: 'fee',
                    date: row[0],
                    xianyuAmount: parseFloat(row[1]) || 0,
                    fee: parseFloat(row[2]) || 0,
                    alipay: parseFloat(row[3]) || 0,
                    hemaActual: parseFloat(row[4]) || 0,
                    refund: parseFloat(row[5]) || 0,
                    actualProfit: parseFloat(row[7]) || 0
                });
            }
            return records;
        }
        
        function changeMonth(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderRecords();
        }
        
        function updateMonthDisplay() {
            const y = currentMonth.getFullYear();
            const m = currentMonth.getMonth() + 1;
            document.getElementById('currentMonth').textContent = `${y}年${m}月`;
        }
        
        function renderRecords() {
            updateMonthDisplay();
            const monthStr = currentMonth.toISOString().substring(0, 7);
            const filtered = allRecords.filter(r => r.date?.startsWith(monthStr));
            
            const list = document.getElementById('recordList');
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>本月暂无记录</p></div>';
                return;
            }
            
            list.innerHTML = filtered.map(r => `
                <div class="record-card" onclick="showDetail('${r.id}')">
                    <div class="top">
                        <span class="date">${r.date}<span class="type-tag">${r.type === 'fee' ? '收手续费' : '免手续费'}</span></span>
                        <span class="profit">+¥${r.actualProfit.toFixed(2)}</span>
                    </div>
                    <div class="details">
                        <div class="detail-item"><div class="Label">闲鱼</div><div class="Value">¥${r.xianyuAmount}</div></div>
                        <div class="detail-item"><div class="Label">到账</div><div class="Value">¥${r.alipay.toFixed(2)}</div></div>
                        <div class="detail-item"><div class="Label">盒马</div><div class="Value">¥${r.hemaActual}</div></div>
                        <div class="detail-item"><div class="Label">可退</div><div class="Value">¥${(r.refund || 0).toFixed(2)}</div></div>
                    </div>
                </div>
            `).join('');
        }
        
        function updateStats() {
            const today = new Date().toISOString().substring(0, 10);
            const thisMonth = currentMonth.toISOString().substring(0, 7);
            
            let todayP = 0, monthP = 0, totalP = 0;
            allRecords.forEach(r => {
                const p = r.actualProfit || 0;
                totalP += p;
                if (r.date === today) todayP += p;
                if (r.date?.startsWith(thisMonth)) monthP += p;
            });
            
            document.getElementById('todayProfit').textContent = '¥' + todayP.toFixed(2);
            document.getElementById('monthProfit').textContent = '¥' + monthP.toFixed(2);
            document.getElementById('totalProfit').textContent = '¥' + totalP.toFixed(2);
            document.getElementById('recordCount').textContent = allRecords.length;
        }
        
        function selectType(type) {
            recordType = type;
            document.getElementById('recordType').value = type;
            document.getElementById('typeFee').classList.toggle('active', type === 'fee');
            document.getElementById('typeNoFee').classList.toggle('active', type === 'nofee');
            calcResults();
        }
        
        function calcResults() {
            const amount = parseFloat(document.getElementById('inputAmount').value) || 0;
            const hema = parseFloat(document.getElementById('inputHema').value) || 0;
            const container = document.getElementById('calcResults');
            
            let html = '';
            
            if (amount > 0) {
                const fee = amount * 0.016;
                const alipay = amount - fee;
                
                let refund, profit;
                
                if (recordType === 'fee') {
                    refund = alipay - hema;
                    profit = hema * 0.04;
                } else {
                    refund = amount - hema;
                    profit = hema * 0.04 - fee;
                }
                
                html = `
                    <div class="calc-item"><div class="Label">1.6%手续费</div><div class="Value">¥${fee.toFixed(2)}</div></div>
                    <div class="calc-item"><div class="Label">支付宝到账</div><div class="Value">¥${alipay.toFixed(2)}</div></div>
                    <div class="calc-item"><div class="Label">最多可退</div><div class="Value">¥${refund.toFixed(2)}</div></div>
                    <div class="calc-item"><div class="Label">利润(4%)</div><div class="Value green">¥${profit.toFixed(2)}</div></div>
                `;
            } else {
                html = `
                    <div class="calc-item"><div class="Label">-</div><div class="Value">¥0.00</div></div>
                    <div class="calc-item"><div class="Label">-</div><div class="Value">¥0.00</div></div>
                    <div class="calc-item"><div class="Label">-</div><div class="Value">¥0.00</div></div>
                    <div class="calc-item"><div class="Label">-</div><div class="Value">¥0.00</div></div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        function showDetail(id) {
            const r = allRecords.find(x => x.id === id);
            if (!r) return;
            currentDetail = r;
            
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-header">
                    <div class="label">${r.type === 'fee' ? '收手续费' : '免手续费'} · 利润</div>
                    <div class="profit">+¥${r.actualProfit.toFixed(2)}</div>
                </div>
                <div class="detail-grid">
                    <div class="detail-item"><div class="Label">日期</div><div class="Value">${r.date}</div></div>
                    <div class="detail-item"><div class="Label">闲鱼付款</div><div class="Value">¥${r.xianyuAmount}</div></div>
                    <div class="detail-item"><div class="Label">手续费</div><div class="Value">¥${(r.fee || 0).toFixed(2)}</div></div>
                    <div class="detail-item"><div class="Label">支付宝</div><div class="Value">¥${r.alipay.toFixed(2)}</div></div>
                    <div class="detail-item"><div class="Label">盒马消费</div><div class="Value">¥${r.hemaActual}</div></div>
                    <div class="detail-item"><div class="Label">可退</div><div class="Value">¥${(r.refund || 0).toFixed(2)}</div></div>
                </div>
            `;
            document.getElementById('detailModal').classList.add('active');
        }
        
        function closeDetail() { document.getElementById('detailModal').classList.remove('active'); }
        
        function editRecord() {
            if (!currentDetail) return;
            closeDetail();
            const form = document.getElementById('recordForm');
            form.date.value = currentDetail.date;
            form.xianyuAmount.value = currentDetail.xianyuAmount;
            form.hemaActual.value = currentDetail.hemaActual;
            document.getElementById('recordId').value = currentDetail.id;
            selectType(currentDetail.type);
            calcResults();
            document.getElementById('addModal').classList.add('active');
        }
        
        async function deleteRecord() {
            if (!currentDetail || !confirm('确定删除？')) return;
            const idx = allRecords.findIndex(r => r.id === currentDetail.id);
            if (idx > -1) allRecords.splice(idx, 1);
            await saveToServer();
            closeDetail();
            renderRecords();
            updateStats();
            showToast('删除成功');
        }
        
        function openAddModal() {
            const form = document.getElementById('recordForm');
            form.reset();
            document.getElementById('inputDate').value = new Date().toISOString().substring(0, 10);
            document.getElementById('recordId').value = '';
            selectType('fee');
            document.getElementById('addModal').classList.add('active');
        }
        
        function closeModal() { document.getElementById('addModal').classList.remove('active'); }
        
        async function saveRecord(e) {
            e.preventDefault();
            const form = e.target;
            const amount = parseFloat(form.xianyuAmount.value) || 0;
            const hema = parseFloat(form.hemaActual.value) || 0;
            const type = form.type.value;
            
            const fee = amount * 0.016;
            const alipay = amount - fee;
            
            let refund, profit;
            
            if (type === 'fee') {
                refund = alipay - hema;
                profit = hema * 0.04;
            } else {
                refund = amount - hema;
                profit = hema * 0.04 - fee;
            }
            
            let data = {
                id: form.id.value,
                type: type,
                date: form.date.value,
                xianyuAmount: amount,
                hemaActual: hema,
                fee: fee,
                alipay: alipay,
                refund: refund,
                actualProfit: profit
            };
            
            if (data.id) {
                const idx = allRecords.findIndex(r => r.id === data.id);
                if (idx > -1) allRecords[idx] = { ...allRecords[idx], ...data };
            } else {
                data.id = type + '_' + Date.now();
                allRecords.unshift(data);
            }
            
            allRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            await saveToServer();
            closeModal();
            renderRecords();
            updateStats();
            showToast('保存成功');
        }
        
        async function saveToServer() {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUser.id, records: allRecords })
            });
        }
        
        function exportExcel() {
            window.location.href = '/api/export?userId=' + currentUser.id;
        }
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
        
        // 初始化
        checkLogin();
    </script>
</body>
</html>
