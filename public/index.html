<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>闲鱼代结账</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
        }
        
        /* 容器 - 居中显示 */
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px;
        }
        @media (min-width: 768px) {
            .container { max-width: 560px; }
        }
        
        /* 顶部 */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            color: white;
            padding: 24px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
        }
        .header-content {
            max-width: 560px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header .total {
            text-align: right;
        }
        .header .total .label { font-size: 12px; opacity: 0.8; }
        .header .total .value { font-size: 24px; font-weight: bold; }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 20px 0;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid var(--border);
        }
        .stat-card.highlight { 
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            color: white;
        }
        .stat-card .label { font-size: 12px; color: var(--text-light); margin-bottom: 4px; }
        .stat-card.highlight .label { color: rgba(255,255,255,0.8); }
        .stat-card .value { font-size: 18px; font-weight: 700; }
        .stat-card .value.green { color: var(--success); }
        .stat-card .value.orange { color: var(--warning); }
        
        /* 快捷操作 */
        .quick-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .quick-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .quick-btn.primary { 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .quick-btn.secondary { 
            background: white; 
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        /* 月份筛选 */
        .month-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .month-selector button {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .month-selector span { font-weight: 500; }
        
        /* 记录列表 */
        .record-list { padding-bottom: 20px; }
        .record-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .record-card:hover { 
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.15);
        }
        .record-card .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .record-card .date { 
            font-size: 14px; 
            font-weight: 600;
            color: var(--text);
        }
        .record-card .profit { 
            font-size: 20px; 
            font-weight: 700; 
            color: var(--success);
        }
        .record-card .details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .record-card .detail-item {
            text-align: center;
            padding: 8px;
            background: var(--bg);
            border-radius: 8px;
        }
        .record-card .detail-item .label { font-size: 11px; color: var(--text-light); }
        .record-card .detail-item .value { font-size: 13px; font-weight: 500; margin-top: 2px; }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
        
        /* 底部 */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            z-index: 100;
        }
        .bottom-bar .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: white; border: 1px solid var(--border); color: var(--text); }
        
        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
        .modal-content {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            padding: 24px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-header h2 { font-size: 18px; font-weight: 600; }
        .modal-close { 
            width: 32px; height: 32px; 
            border: none; background: var(--bg);
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 18px;
            color: var(--text-light);
        }
        
        /* 表单 */
        .form-section {
            background: var(--bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .form-section h3 {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group:last-child { margin-bottom: 0; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            color: var(--text-light); 
            margin-bottom: 8px; 
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-group input[readonly] {
            background: #f1f5f9;
            color: var(--text-light);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        /* 计算结果展示 */
        .calc-results {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .calc-item {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .calc-item .label { font-size: 12px; color: var(--text-light); }
        .calc-item .value { font-size: 16px; font-weight: 600; margin-top: 4px; }
        .calc-item .value.green { color: var(--success); }
        
        /* 详情 */
        .detail-header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            color: white;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .detail-header .label { font-size: 14px; opacity: 0.9; }
        .detail-header .profit { font-size: 36px; font-weight: 700; margin-top: 8px; }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .detail-item {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .detail-item .label { font-size: 12px; color: var(--text-light); }
        .detail-item .value { font-size: 16px; font-weight: 600; margin-top: 4px; }
        
        .detail-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .detail-actions .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-danger { background: #fef2f2; color: var(--danger); }
        .btn-edit { background: var(--primary); color: white; }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }
        .toast.show { display: block; animation: fadeIn 0.3s; }
        
        /* 加载 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }
        
        @media (min-width: 768px) {
            body { padding: 40px 0; }
            .container { 
                background: white; 
                border-radius: 24px; 
                box-shadow: 0 4px 40px rgba(0,0,0,0.1);
                padding: 32px;
                margin-bottom: 40px;
            }
            .bottom-bar {
                position: relative;
                box-shadow: none;
                padding: 20px 0 0;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部 -->
    <div class="header">
        <div class="header-content">
            <div>
                <h1>💰 闲鱼代结账</h1>
                <div style="font-size: 12px; opacity: 0.8; margin-top: 4px;">记录每一笔收入</div>
            </div>
            <div class="total">
                <div class="label">累计收入</div>
                <div class="value" id="totalProfit">¥0</div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <!-- 统计 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">今日收入</div>
                <div class="value green" id="todayProfit">¥0</div>
            </div>
            <div class="stat-card">
                <div class="label">本月收入</div>
                <div class="value green" id="monthProfit">¥0</div>
            </div>
            <div class="stat-card highlight">
                <div class="label">记录条数</div>
                <div class="value" id="recordCount">0</div>
            </div>
        </div>
        
        <!-- 快捷操作 -->
        <div class="quick-actions">
            <button class="quick-btn secondary" onclick="exportExcel()">📥 导出</button>
            <button class="quick-btn primary" onclick="openAddModal()">➕ 记一笔</button>
        </div>
        
        <!-- 月份筛选 -->
        <div class="month-selector">
            <button onclick="changeMonth(-1)">‹</button>
            <span id="currentMonth">2026年3月</span>
            <button onclick="changeMonth(1)">›</button>
        </div>
        
        <!-- 记录列表 -->
        <div class="record-list" id="recordList">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <!-- 底部 -->
    <div class="bottom-bar">
        <button class="btn btn-outline" onclick="exportExcel()">📥 导出Excel</button>
        <button class="btn btn-primary" onclick="openAddModal()">➕ 记一笔</button>
    </div>
    
    <!-- 添加弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📝 记一笔收入</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            
            <form id="recordForm" onsubmit="saveRecord(event)">
                <div class="form-section">
                    <h3>基本信息</h3>
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" name="date" id="inputDate" required>
                    </div>
                    <div class="form-group">
                        <label>闲鱼付款金额 (¥) *</label>
                        <input type="number" name="xianyuAmount" id="inputAmount" step="0.01" placeholder="请输入客户付款金额" required oninput="calcResults()">
                    </div>
                </div>
                
                <div class="form-section">
                    <h3>💡 自动计算结果</h3>
                    <div class="calc-results">
                        <div class="calc-item">
                            <div class="label">1.6% 手续费</div>
                            <div class="value" id="calcFee">¥0.00</div>
                        </div>
                        <div class="calc-item">
                            <div class="label">支付宝到账</div>
                            <div class="value" id="calcAlipay">¥0.00</div>
                        </div>
                        <div class="calc-item">
                            <div class="label">盒马实际支付</div>
                            <input type="number" name="hemaActual" id="inputHema" step="0.01" placeholder="请输入" style="margin-top:4px;padding:8px;font-size:14px" oninput="calcResults()">
                        </div>
                        <div class="calc-item">
                            <div class="label">最多可退</div>
                            <div class="value" id="calcRefund">¥0.00</div>
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h3>💰 利润计算</h3>
                    <div class="calc-results">
                        <div class="calc-item">
                            <div class="label">盒马会员卡利润 (32%)</div>
                            <div class="value" id="calcHemaProfit">¥0.00</div>
                        </div>
                        <div class="calc-item">
                            <div class="label">实际利润</div>
                            <div class="value green" id="calcTotalProfit">¥0.00</div>
                        </div>
                    </div>
                </div>
                
                <input type="hidden" name="id" id="recordId">
                <button type="submit" class="btn btn-primary" style="width:100%">💾 保存记录</button>
            </form>
        </div>
    </div>
    
    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 记录详情</h2>
                <button class="modal-close" onclick="closeDetail()">×</button>
            </div>
            
            <div id="detailContent"></div>
            
            <div class="detail-actions">
                <button class="btn btn-danger" onclick="deleteRecord()">🗑️ 删除</button>
                <button class="btn btn-edit" onclick="editRecord()">✏️ 编辑</button>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        let allRecords = [];
        let currentMonth = new Date();
        let currentDetail = null;
        
        // 初始化
        async function init() {
            await loadData();
            renderRecords();
            updateStats();
            // 默认今天
            document.getElementById('inputDate').value = new Date().toISOString().substring(0, 10);
        }
        
        // 加载数据
        async function loadData() {
            try {
                const res = await fetch('/api/data');
                const result = await res.json();
                if (result.success && result.data.length > 2) {
                    allRecords = parseExcelData(result.data);
                    // 按日期降序
                    allRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
                }
            } catch (err) {
                showToast('加载失败: ' + err.message);
            }
        }
        
        // 解析Excel数据
        function parseExcelData(data) {
            const records = [];
            for (let i = 2; i < data.length; i++) {
                const row = data[i];
                if (!row[0]) continue; // 只取收手续费
                
                records.push({
                    id: 'fee_' + i,
                    date: row[0],
                    xianyuAmount: parseFloat(row[1]) || 0,
                    fee: parseFloat(row[2]) || 0,
                    alipay: parseFloat(row[3]) || 0,
                    hemaActual: parseFloat(row[4]) || 0,
                    refund: parseFloat(row[5]) || 0,
                    hemaProfit: parseFloat(row[6]) || 0,
                    actualProfit: parseFloat(row[7]) || 0
                });
            }
            return records;
        }
        
        // 切换月份
        function changeMonth(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderRecords();
            updateStats();
        }
        
        // 更新月份显示
        function updateMonthDisplay() {
            const y = currentMonth.getFullYear();
            const m = currentMonth.getMonth() + 1;
            document.getElementById('currentMonth').textContent = `${y}年${m}月`;
        }
        
        // 渲染记录
        function renderRecords() {
            updateMonthDisplay();
            
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth() + 1;
            const monthStr = `${year}-${String(month).padStart(2, '0')}`;
            
            const filtered = allRecords.filter(r => r.date?.startsWith(monthStr));
            
            const list = document.getElementById('recordList');
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>本月暂无记录</p>
                        <p style="font-size:13px;margin-top:8px;color:#94a3b8">点击下方"记一笔"添加</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filtered.map(r => `
                <div class="record-card" onclick="showDetail('${r.id}')">
                    <div class="top">
                        <span class="date">${r.date}</span>
                        <span class="profit">+¥${r.actualProfit.toFixed(2)}</span>
                    </div>
                    <div class="details">
                        <div class="detail-item">
                            <div class="label">闲鱼付款</div>
                            <div class="value">¥${r.xianyuAmount}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">到账</div>
                            <div class="value">¥${r.alipay}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">盒马消费</div>
                            <div class="value">¥${r.hemaActual}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 更新统计
        function updateStats() {
            const today = new Date().toISOString().substring(0, 10);
            const thisMonth = currentMonth.toISOString().substring(0, 7);
            
            let todayProfit = 0, monthProfit = 0, totalProfit = 0;
            
            allRecords.forEach(r => {
                const profit = r.actualProfit || 0;
                totalProfit += profit;
                if (r.date === today) todayProfit += profit;
                if (r.date?.startsWith(thisMonth)) monthProfit += profit;
            });
            
            document.getElementById('todayProfit').textContent = '¥' + todayProfit.toFixed(2);
            document.getElementById('monthProfit').textContent = '¥' + monthProfit.toFixed(2);
            document.getElementById('totalProfit').textContent = '¥' + totalProfit.toFixed(2);
            document.getElementById('recordCount').textContent = allRecords.length;
        }
        
        // 计算结果
        function calcResults() {
            const amount = parseFloat(document.getElementById('inputAmount').value) || 0;
            const hema = parseFloat(document.getElementById('inputHema').value) || 0;
            
            const fee = amount * 0.016;
            const alipay = amount - fee;
            const refund = alipay - hema;
            const hemaProfit = refund * 0.32;
            const totalProfit = hemaProfit + fee * 0.1;
            
            document.getElementById('calcFee').textContent = '¥' + fee.toFixed(2);
            document.getElementById('calcAlipay').textContent = '¥' + alipay.toFixed(2);
            document.getElementById('calcRefund').textContent = '¥' + refund.toFixed(2);
            document.getElementById('calcHemaProfit').textContent = '¥' + hemaProfit.toFixed(2);
            document.getElementById('calcTotalProfit').textContent = '¥' + totalProfit.toFixed(2);
            
            return { fee, alipay, refund, hemaProfit, totalProfit, hema };
        }
        
        // 显示详情
        function showDetail(id) {
            const record = allRecords.find(r => r.id === id);
            if (!record) return;
            currentDetail = record;
            
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-header">
                    <div class="label">实际利润</div>
                    <div class="profit">+¥${record.actualProfit.toFixed(2)}</div>
                </div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="label">日期</div>
                        <div class="value">${record.date}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">闲鱼付款</div>
                        <div class="value">¥${record.xianyuAmount}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">1.6%手续费</div>
                        <div class="value">¥${record.fee.toFixed(2)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">支付宝到账</div>
                        <div class="value">¥${record.alipay.toFixed(2)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">盒马实际</div>
                        <div class="value">¥${record.hemaActual}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">最多可退</div>
                        <div class="value">¥${record.refund.toFixed(2)}</div>
                    </div>
                </div>
            `;
            
            document.getElementById('detailModal').classList.add('active');
        }
        
        // 关闭详情
        function closeDetail() {
            document.getElementById('detailModal').classList.remove('active');
        }
        
        // 编辑
        function editRecord() {
            if (!currentDetail) return;
            closeDetail();
            
            const form = document.getElementById('recordForm');
            form.date.value = currentDetail.date;
            form.xianyuAmount.value = currentDetail.xianyuAmount;
            form.hemaActual.value = currentDetail.hemaActual;
            document.getElementById('recordId').value = currentDetail.id;
            calcResults();
            document.getElementById('addModal').classList.add('active');
        }
        
        // 删除
        async function deleteRecord() {
            if (!currentDetail || !confirm('确定删除这条记录吗？')) return;
            
            const idx = allRecords.findIndex(r => r.id === currentDetail.id);
            if (idx > -1) allRecords.splice(idx, 1);
            
            await saveToExcel();
            closeDetail();
            renderRecords();
            updateStats();
            showToast('删除成功');
        }
        
        // 打开添加
        function openAddModal() {
            const form = document.getElementById('recordForm');
            form.reset();
            document.getElementById('inputDate').value = new Date().toISOString().substring(0, 10);
            document.getElementById('recordId').value = '';
            calcResults();
            document.getElementById('addModal').classList.add('active');
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
        }
        
        // 保存记录
        async function saveRecord(e) {
            e.preventDefault();
            const form = e.target;
            const amount = parseFloat(form.xianyuAmount.value) || 0;
            const hema = parseFloat(form.hemaActual.value) || 0;
            
            const calc = calcResults();
            
            const data = {
                id: form.id.value,
                date: form.date.value,
                xianyuAmount: amount,
                hemaActual: hema,
                fee: calc.fee,
                alipay: calc.alipay,
                refund: calc.refund,
                hemaProfit: calc.hemaProfit,
                actualProfit: calc.totalProfit
            };
            
            if (data.id) {
                const idx = allRecords.findIndex(r => r.id === data.id);
                if (idx > -1) allRecords[idx] = { ...allRecords[idx], ...data };
            } else {
                data.id = 'fee_' + Date.now();
                allRecords.unshift(data);
            }
            
            allRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            await saveToExcel();
            closeModal();
            renderRecords();
            updateStats();
            showToast('保存成功');
        }
        
        // 保存到Excel
        async function saveToExcel() {
            const excelData = [
                ['收手续费', '', '', '', '', '', '', '', '', '免手续费'],
                ['日期', '闲鱼付款金额', '1.6的手续费', '支付宝到账', '盒马实际支付', '最多可退', '盒马会员卡利润', '实际利润', '', '日期', '闲鱼付款金额', '盒马实际支付', '手续费（1.6%）', '支付宝到账', '最多可退', '利润']
            ];
            
            allRecords.forEach(r => {
                excelData.push([
                    r.date, r.xianyuAmount, r.fee.toFixed(2), r.alipay.toFixed(2), r.hemaActual, r.refund.toFixed(2), r.hemaProfit.toFixed(2), r.actualProfit.toFixed(2), '', '', '', '', '', '', '', ''
                ]);
            });
            
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: excelData })
            });
        }
        
        // 导出
        function exportExcel() {
            window.location.href = '/api/export';
        }
        
        // 提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // 启动
        init();
    </script>
</body>
</html>
